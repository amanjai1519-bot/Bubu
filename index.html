<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Baebu ❤️</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth transition style for screen fading */
        .screen-transition {
            transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-100 to-rose-200 min-h-screen flex items-center justify-center overflow-hidden font-sans p-4 select-none">

    <!-- Floating Hearts Background Layer -->
    <div class="absolute inset-0 pointer-events-none opacity-40 overflow-hidden">
        <div class="absolute text-rose-400 text-3xl animate-bounce top-12 left-10 duration-1000">❤️</div>
        <div class="absolute text-rose-400 text-2xl animate-pulse top-1/3 right-12 duration-700">💖</div>
        <div class="absolute text-rose-400 text-4xl animate-bounce bottom-16 left-1/4 duration-500">💝</div>
        <div class="absolute text-rose-400 text-3xl animate-pulse top-2/3 right-1/4 duration-1000">💗</div>
    </div>

    <!-- Main Container Card -->
    <div class="bg-white/80 backdrop-blur-md p-8 rounded-3xl shadow-2xl max-w-md w-full text-center border border-pink-200 z-10 relative transform hover:scale-[1.01] transition-transform duration-300">
        
        <!-- ================= SCREEN 1: INITIAL SCREEN ================= -->
        <div id="screen1" class="screen-transition opacity-100 scale-100 flex flex-col items-center justify-center gap-8">
            <h1 class="text-4xl md:text-5xl font-extrabold text-rose-600 tracking-wide drop-shadow-sm">
                Hey baebu ✨
            </h1>
            <div class="flex flex-col sm:flex-row gap-4 w-full justify-center">
                <button onclick="handleChoice('love')" class="cursor-pointer bg-gradient-to-r from-rose-400 to-pink-500 hover:from-rose-500 hover:to-pink-600 text-white font-bold py-4 px-6 rounded-2xl transition-all duration-200 transform hover:scale-105 active:scale-95">
                    u love me
                </button>
                <button onclick="handleChoice('more')" class="cursor-pointer bg-gradient-to-r from-pink-500 to-purple-500 hover:from-pink-600 hover:to-purple-600 text-white font-bold py-4 px-6 rounded-2xl transition-all duration-200 transform hover:scale-105 active:scale-95">
                    u love me more
                </button>
            </div>
        </div>

        <!-- ================= SCREEN 2A: PENGUIN CHOICE ================= -->
        <div id="screen2-love" class="screen-transition opacity-0 scale-95 hidden flex flex-col items-center justify-center gap-6">
            <div class="w-48 h-48 bg-pink-50 rounded-2xl overflow-hidden shadow-inner flex items-center justify-center border border-pink-100">
                <img src="https://media.tenor.com/YXp38y4wQ70AAAAd/penguin-cute.gif" alt="Cute Penguin" class="w-full h-full object-cover">
            </div>
            <p class="text-xl font-medium text-rose-700 leading-relaxed max-w-sm px-2">
                wifey you are my safest place in this universe will u be my penguin🙈
            </p>
        </div>

        <!-- ================= SCREEN 2B: COUPLE CHOICE ================= -->
        <div id="screen2-more" class="screen-transition opacity-0 scale-95 hidden flex flex-col items-center justify-center gap-6">
            <div class="w-48 h-48 bg-pink-50 rounded-2xl overflow-hidden shadow-inner flex items-center justify-center border border-pink-100">
                <img src="couple-photo.jpg" alt="Us Together" class="w-full h-full object-cover">
            </div>
            <p class="text-xl font-medium text-purple-700 leading-relaxed italic max-w-sm px-2">
                intezar karenge hum tera chahe zamane lag jae zamane lag jae yaa tu aa jae yaa hum thikane lag jae💌
            </p>
        </div>

        <!-- ================= SCREEN 3: FINAL SCREEN (10s AUTO-TRIGGER) ================= -->
        <div id="screen3" class="screen-transition opacity-0 scale-95 hidden flex flex-col items-center justify-center gap-6">
            <div class="w-48 h-48 bg-yellow-50 rounded-2xl overflow-hidden shadow-inner flex items-center justify-center border border-yellow-100">
                <img src="https://media.tenor.com/h-aHK68X5OEAAAAd/cute-chick.gif" alt="Cute Chick" class="w-full h-full object-cover">
            </div>
            <p class="text-2xl font-bold text-amber-600 tracking-wide leading-snug max-w-sm px-2">
                mera dudu pudu phushphush mera duniya hai tu
            </p>
        </div>

    </div>

    <!-- JavaScript Logic -->
    <script>
        const ANIMATION_DURATION = 800; // ms
        const SCREEN_DELAY = 10000; // ms
        let currentScreenId = 'screen1';

        function changeScreen(fromId, toId) {
            const fromScreen = document.getElementById(fromId);
            const toScreen = document.getElementById(toId);

            // Step 1: Fade out old screen
            fromScreen.classList.remove('opacity-100', 'scale-100');
            fromScreen.classList.add('opacity-0', 'scale-95');

            // Wait for fade out animation to finish (800ms match with CSS)
            setTimeout(() => {
                fromScreen.classList.add('hidden');
                
                // Step 2: Prepare and show new screen
                toScreen.classList.remove('hidden');
                
                // Force layout recalculation so the browser registers the entry transition
                void toScreen.offsetHeight; 
                
                toScreen.classList.remove('opacity-0', 'scale-95');
                toScreen.classList.add('opacity-100', 'scale-100');
                currentScreenId = toId;
            }, ANIMATION_DURATION);
        }

        function handleChoice(choice) {
            let nextScreenId = choice === 'love' ? 'screen2-love' : 'screen2-more';
            
            // Go to the intermediate screen
            changeScreen('screen1', nextScreenId);

            // Trigger the absolute final screen exactly 10 seconds later
            setTimeout(() => {
                changeScreen(nextScreenId, 'screen3');
            }, SCREEN_DELAY);
        }
    </script>
</body>
</html>
